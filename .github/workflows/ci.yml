name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Test (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          cmake ..
          ctest --output-on-failure -j 2

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Test (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        shell: pwsh
        run: |
          cmake ..
          ctest -C Release --output-on-failure -j 2
